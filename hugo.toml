
baseURL = "https://ratfl.github.io/Netrunner/"
languageCode = "es"
title = "The Netrunner Blog"
theme = "hugo-theme-terminal"

[params]
  description = "Walkthroughs, laboratorios y análisis de ciberseguridad"
  themeColor = "dark"
  showReadingTime = true
  showCodeCopyButtons = true
  images = ["img/netrunner-banner.png"]
  customCSS = ["css/custom.css"]
  customJS = ["js/skull.js"]
	
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/RaTFl"
  [[params.socialIcons]]
    name = "linkedin"
    url = "https://www.linkedin.com/in/ra%C3%BAl-torres-733061400/"

[markup.highlight]
  style = "monokai"
  guessSyntax = true
  tabWidth = 4
  anchorLineNos = true

[outputs]
  home = ["HTML", "RSS"]


